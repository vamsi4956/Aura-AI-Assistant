<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Aura Home AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,fill,grad@24,400,0,0" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-window">
            
            <div class="app-header">
                <div class="status-group">
                    <span class="material-symbols-outlined">thermostat</span>
                    <span>24°C</span>
                </div>

                <div class="branding">
                    <span class="aura-logo">Aura</span>
                    <span class="subtitle">Home AI Assistant</span>
                </div>

                <div class="status-group">
                    <span class="material-symbols-outlined">verified_user</span>
                    <span>Secure</span>
                </div>
            </div>

            <div id="chatbox" class="chat-viewport">
                <div class="message bot">Welcome back, Vamsi. Systems are nominal. How can I manage your home today?</div>
            </div>

            <div class="input-section">
                <div class="input-pill">
                    <input id="input" type="text" placeholder="Ask Aura anything..." autocomplete="off">
                    <button onclick="sendMessage()" class="send-btn">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
